<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LIMS Demo - Home</title>
    <!-- BOOTSTRAP STYLES-->
    <link href="assets/css/bootstrap.css" rel="stylesheet" />
    <!-- FONTAWESOME STYLES-->
    <link href="assets/css/font-awesome.css" rel="stylesheet" />
    <!--CUSTOM BASIC STYLES-->
    <link href="assets/css/basic.css" rel="stylesheet" />
    <!--CUSTOM MAIN STYLES-->
    <link href="assets/css/custom.css" rel="stylesheet" />
    <!-- GOOGLE FONTS-->
    <link href="https://fonts.googleapis.com/css?family=Open+Sans" rel="stylesheet" type="text/css" />
    <style>
        .searchBar {
            width: 100%;
            padding: 12px 20px;
            margin: 8px 0;
            display: inline-block;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            background: #fff;
        }
        .searchBtn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 5px;
        }
        .searchBtn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div id="wrapper">
        <nav class="navbar navbar-default navbar-cls-top " role="navigation" style="margin-bottom: 0">
            <div class="navbar-header">
                <a class="navbar-brand" href="home.html">LIMS Portal</a>
            </div>
            <div class="header-right">
                 <a href="index.html" class="btn btn-danger" title="Logout"><i class="fa fa-exclamation-circle fa-2x"></i></a>
            </div>
        </nav>
        <!-- /. NAV TOP  -->
        <nav class="navbar-default navbar-side" role="navigation">
            <div class="sidebar-collapse">
                <ul class="nav" id="main-menu">
                    <li>
                        <div class="user-img-div">
                            <img src="assets/img/user.png" class="img-thumbnail" />
                            <div class="inner-text">
                                welcome, <span id="welcomeUser">admin</span>
                            </div>
                        </div>
                    </li>
                    <li><a href="client.html"><i class="fa fa-users "></i>CLIENTS</a></li>
                    <li><a href="agent.html"><i class="fa fa-life-saver "></i>AGENTS</a></li>
                    <li><a href="policy.html"><i class="fa fa-pencil-square-o "></i>POLICY</a></li>
                    <li><a href="nominee.html"><i class="fa fa-heart "></i>NOMINEE</a></li>
                    <li><a href="payment.html"><i class="fa fa-credit-card "></i>PAYMENTS</a></li>
                </ul>
            </div>
        </nav>
        <!-- /. NAV SIDE  -->
        <div id="page-wrapper">
            <div class="row">
                <div class="col-md-12">
                    <h1 class="page-head-line">LIMS Dashboard</h1>
                </div>
            </div>
            
            <div class="searchBar">
                <form onsubmit="event.preventDefault(); alert('Search functionality is simulated for demo!');">
                    <input type="text" placeholder="Search clients..." style="width: 100%; padding: 8px;" required><br>
                    <input class="searchBtn" type="submit" value="SEARCH">
                </form>
            </div>
            
            <br>
            <div class="row">
                <div class="col-md-4">
                    <div class="main-box mb-red">
                        <a href="client.html">
                            <i class="fa fa-user fa-5x"></i>
                            <h5>Total Clients: 20</h5>
                        </a>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="main-box mb-dull">
                        <a href="payment.html">
                            <i class="fa fa-dollar fa-5x"></i>
                            <h5>Payment Records: 15</h5>
                        </a>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="main-box mb-pink">
                        <a href="agent.html">
                            <i class="fa fa-user-md fa-5x"></i>
                            <h5>Total Agents: 5</h5>
                        </a>
                    </div>
                </div>
            </div>
        </div>
        <!-- /. PAGE WRAPPER  -->
    </div>
    <!-- /. WRAPPER  -->

    <script>
        const user = localStorage.getItem("lims_username") || "admin";
        document.getElementById("welcomeUser").textContent = user;
    </script>
</body>
</html>
